<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="style.css">
</head>
<section class="formulario-registro">
    <h1>Formulario de registro</h1>
    <form action="/tu-endpoint-de-procesamiento" method="POST">
        
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan">
        </div>

        <div class="form-group">
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required placeholder="Ej. Pérez">
        </div>

        <div class="form-group">
            <label for="cargo">Cargo:</label>
            <select id="cargo" name="cargo" required>
                <option value="" disabled selected>Selecciona un cargo...</option>
                <option value="desarrollador">Desarrollador</option>
                <option value="disenador">Diseñador UX/UI</option>
                <option value="analista">Analista de Datos</option>
                <option value="gerente">Gerente de Proyecto</option>
                <option value="soporte">Soporte Técnico</option>
            </select>
        </div>

        <div class="form-group">
            <label for="correo">Correo Corporativo:</label>
            <input type="email" id="correo" name="correo_corporativo" required placeholder="juan.perez@empresa.cl">
        </div>

        <div class="form-group">
            <button type="submit">Guardar Registro</button>
        </div>

    </form>
</section>
<body>
    
    <script src="app.js"></script>
</body>
</html>
